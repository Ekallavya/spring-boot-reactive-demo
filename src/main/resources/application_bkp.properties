# Maximum file size for a single uploaded file
spring.servlet.multipart.max-file-size=10MB

# Maximum request size (total of all files in a request)
spring.servlet.multipart.max-request-size=20MB

spring.servlet.multipart.enabled=false

spring.jackson.deserialization.fail-on-unknown-properties=true

server.tomcat.max-swallow-size=2MB
server.tomcat.max-http-form-post-size=2MB

# DataSource Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/your_database_name?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#HikariCP Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=HikariCP
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.leak-detection-threshold=20000
spring.datasource.hikari.register-mbeans=true
spring.datasource.hikari.allow-pool-suspension=false
spring.datasource.hikari.read-only=false
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048

#kafka configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=your-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.batch-size=16384
spring.kafka.producer.linger-ms=1
spring.kafka.producer.buffer-memory=33554432
spring.kafka.producer.max-request-size=2097152
spring.kafka.producer.compression-type=snappy
spring.kafka.producer.enable-idempotence=true
spring.kafka.producer.transaction-id-prefix=txn-

#ActiveMQ configuration
spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.user=admin
spring.activemq.password=admin
spring.activemq.pool.enabled=true
spring.activemq.pool.max-connections=10
spring.activemq.pool.idle-timeout=30000
spring.activemq.pool.max-wait=30000
spring.activemq.pool.max-size=10
spring.activemq.pool.min-size=5
spring.activemq.pool.block-if-full=true
spring.activemq.pool.test-on-borrow=true
spring.activemq.pool.test-on-return=true
spring.activemq.pool.test-while-idle=true
spring.activemq.pool.time-between-eviction-runs-millis=30000
spring.activemq.pool.num-tests-per-eviction-run=3
spring.activemq.pool.min-evictable-idle-time-millis=60000
spring.activemq.pool.jmx-enabled=true
spring.activemq.pool.exhausted-action=block

#Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
management.endpoint.info.enabled=true
management.metrics.export.prometheus.enabled=true
management.endpoints.web.exposure.exclude=env,beans,loggers,threaddump,heapdump
management.endpoint.health.probes.enabled=true

